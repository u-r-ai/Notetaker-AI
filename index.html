<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recall.ai Bot Launcher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        .loader {
            border-top-color: #3b82f6;
            animation: spinner 1.5s linear infinite;
        }

        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md glass-card rounded-2xl p-8">
        <div class="mb-8 text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-100 rounded-full mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-900">Bot Launcher</h1>
            <p class="text-gray-500 mt-2">Enter your meeting URL to invite the bot.</p>
        </div>

        <form id="botForm" class="space-y-6">
            <div>
                <label for="meeting_url" class="block text-sm font-medium text-gray-700 mb-1">Meeting URL</label>
                <input 
                    type="url" 
                    id="meeting_url" 
                    name="meeting_url" 
                    required 
                    placeholder="https://zoom.us/j/..."
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all outline-none"
                >
            </div>

            <button 
                type="submit" 
                id="submitBtn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg transition-colors flex items-center justify-center space-x-2 disabled:opacity-50 disabled:cursor-not-allowed"
            >
                <span id="btnText">Launch Bot</span>
                <div id="btnLoader" class="loader ease-linear rounded-full border-2 border-t-2 border-gray-200 h-5 w-5 hidden"></div>
            </button>
        </form>

        <div id="statusMessage" class="mt-6 hidden rounded-lg p-4 text-sm font-medium"></div>

        <div id="responseDetails" class="mt-4 hidden">
            <p class="text-xs text-gray-400 mb-1 uppercase tracking-wider font-bold">API Response</p>
            <pre class="bg-gray-900 text-green-400 p-4 rounded-lg text-xs overflow-x-auto whitespace-pre-wrap"></pre>
        </div>
    </div>

    <script>
        const botForm = document.getElementById('botForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnLoader = document.getElementById('btnLoader');
        const statusMessage = document.getElementById('statusMessage');
        const responseDetails = document.getElementById('responseDetails');
        const pre = responseDetails.querySelector('pre');

        // Note: In a production environment, you should never expose API keys on the frontend.
        const API_KEY = "ed21bd33ee7fd3aaa3f353e78ac35a1ff4d44f60";
        
        // IMPORTANT CORS FIX:
        // We are using a public CORS proxy (corsproxy.io) to bypass the browser's preflight check.
        // This allows the frontend to send the request for testing purposes.
        const TARGET_URL = "https://ap-northeast-1.recall.ai/i/api/v1/bot/";
        const API_URL = "https://corsproxy.io/?" + encodeURIComponent(TARGET_URL);

        botForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const meetingUrl = document.getElementById('meeting_url').value;
            
            // UI States
            setLoading(true);
            hideStatus();

            const payload = {
                "meeting_url": meetingUrl,
                "recording_config": {
                    "transcript": {
                        "provider": {
                            "recallai_streaming": {
                                "mode": "prioritize_accuracy"
                            }
                        }
                    }
                }
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': API_KEY,
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                let data;
                try {
                    data = await response.json();
                } catch (jsonError) {
                    data = { message: "Failed to parse JSON response. The proxy or API might have returned an unexpected format." };
                }

                if (response.ok) {
                    showStatus('Success! The bot is being deployed.', 'success');
                    showResponse(data);
                } else {
                    showStatus(`Error: ${data.detail || response.statusText || 'Failed to launch bot'}`, 'error');
                    showResponse(data);
                }
            } catch (error) {
                console.error('Fetch error:', error);
                showStatus('Network error or CORS proxy failed. Check console for details.', 'error');
                showResponse({ error: error.message });
            } finally {
                setLoading(false);
            }
        });

        function setLoading(isLoading) {
            submitBtn.disabled = isLoading;
            if (isLoading) {
                btnText.textContent = 'Launching...';
                btnLoader.classList.remove('hidden');
            } else {
                btnText.textContent = 'Launch Bot';
                btnLoader.classList.add('hidden');
            }
        }

        function showStatus(message, type) {
            statusMessage.textContent = message;
            statusMessage.classList.remove('hidden', 'bg-green-100', 'text-green-700', 'bg-red-100', 'text-red-700');
            
            if (type === 'success') {
                statusMessage.classList.add('bg-green-100', 'text-green-700');
            } else {
                statusMessage.classList.add('bg-red-100', 'text-red-700');
            }
        }

        function hideStatus() {
            statusMessage.classList.add('hidden');
            responseDetails.classList.add('hidden');
        }

        function showResponse(data) {
            responseDetails.classList.remove('hidden');
            pre.textContent = JSON.stringify(data, null, 2);
        }
    </script>
</body>
</html>
